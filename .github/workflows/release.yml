name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create Release ZIP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Version aus Tag setzen
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          sed -i "s/\"version\": \".*\"/\"version\": \"$TAG\"/" custom_components/thermocore/manifest.json
          echo "Version set to $TAG"

      - name: Version committen
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add custom_components/thermocore/manifest.json
          git commit -m "chore: bump version to ${GITHUB_REF#refs/tags/v}" || echo "Nothing to commit"
          git push origin HEAD:main || echo "Push failed"

      - name: ZIP erstellen
        run: |
          zip -r ha-thermocore.zip custom_components/ hacs.json

      - name: Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          files: ha-thermocore.zip