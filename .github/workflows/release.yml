name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create Release ZIP
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: ZIP erstellen
        run: |
          zip -r ha-thermocore.zip custom_components/ hacs.json

      - name: Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          files: ha-thermocore.zip